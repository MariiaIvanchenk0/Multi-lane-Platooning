/**:
  ros__parameters:
    R: 1.0                 # reference-path radius (metres) -- NOT a robot dimension
    # --- Yahboom ROSMASTER R2 (Ackermann) approximate specs -- VERIFY against datasheet ---
    wheelbase: 0.145       # front-to-rear axle distance (L). Sets turning radius = L/tan(phi).
    wheel_radius: 0.0325   # ~65mm dia wheels (reference only; not used by the active controller)
    mass: 0.8              # (reference only; not used by the active controller)
    frequency: 20.0

model_simulation_node:
  ros__parameters:
    alpha: 0.0012               # the unknown input gain
    beta: -0.0001               # the unknown damping coefficient
    delta: -0.1                 # a fixed unknown disturbance

    base_frame: "robot_bs"      # name for this robot instance

    s0: 0.0                     # initial s (longitudinal position)
    l0: 0.0                     # initial l (lateral position)
    psi0: 0.0                   # initial psi (yaw/heading angle)
    v0: 0.0                     # initial velocity

# '/**/controller' matches the node named 'controller' under any namespace
# (e.g. /agent_1/controller). A bare 'controller_node:' would NOT match, since
# the launch file renames the node to 'controller' and namespaces it.
"/**/controller":
  ros__parameters:
    gamma_alpha: 0.001
    gamma_beta: 0.0001
    gamma_delta: 0.01

    k_1: 25.0
    k_2: 1.5

    alpha_bar_hat: 833.33 # 1.0
    beta_hat: -0.0001
    delta_hat: -0.1

    alpha: 0.0012
    beta: -0.0001
    delta: -0.1
    
    k_a1: 1.5
    k_a2: 3.0
    l_lane: 0.0

