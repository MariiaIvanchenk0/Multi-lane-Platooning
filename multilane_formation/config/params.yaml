# '/**/formation_controller' matches the node named 'formation_controller'
# under any namespace (e.g. /agent_1/formation_controller).
"/**/formation_controller":
  ros__parameters:
    # id: 1.0
    neighbor_id: [2]    # IDs of topological neighbors
    namespace: "agent"  # Must match omnisim/polytope_safety_net agent namespace
    
    k_s: 0.1 # 0.6
    k_l: 0.1
    k_n: 0.06           # Smooth deadzone design constant

    v_f: 0.3           # Desired cruise speed (m/s)
    n_bar: 0.4          # Bounded noise threshold (m)

